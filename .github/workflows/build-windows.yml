name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "RainDrop-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RainDrop-Windows
          path: RainDrop-Windows.zip

      - name: Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: RainDrop-Windows.zip
          generate_release_notes: true
