name: raindrop_flutter
description: "RainDrop — 채움으로 삶의 밀도를 기록한다. macOS/Windows 집중 타이머 앱."
publish_to: 'none'
version: 2.1.1+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.0

  # Local Storage
  path_provider: ^2.1.5

  # Internationalization
  intl: ^0.20.2

  # UUID
  uuid: ^4.5.1

  # HTTP (for update check)
  http: ^1.2.0

  # URL Launcher
  url_launcher: ^6.3.0

  # Window Management (desktop)
  window_manager: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
